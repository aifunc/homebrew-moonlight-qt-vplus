name: Publish Moonlight Qt VPlus Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read cask metadata
        run: |
          set -euo pipefail

          FILE=Casks/moonlight-qt-vplus.rb
          VER=$(sed -n 's/^  version "\(.*\)"/\1/p' "$FILE")
          SHA256=$(sed -n 's/^  sha256 "\(.*\)"/\1/p' "$FILE")
          DMG_URL=$(sed -n 's/^  url "\(.*\)"/\1/p' "$FILE")

          test -n "$VER"
          test "$VER" != "-"
          test -n "$SHA256"
          test "$SHA256" != "-"
          test -n "$DMG_URL"

          {
            echo "VER=$VER"
            echo "SHA256=$SHA256"
            echo "DMG_URL=$DMG_URL"
          } >> "$GITHUB_ENV"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Homebrew cask update for Moonlight Qt VPlus.

            Upstream release: https://github.com/qiin2333/moonlight-qt/releases/tag/${{ github.ref_name }}
            DMG URL: ${{ env.DMG_URL }}
            SHA256: `${{ env.SHA256 }}`
          make_latest: true
